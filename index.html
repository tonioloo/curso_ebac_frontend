<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário Bootstrap</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="content">
        <H2>Cadastre-se</H2>
        <form>
          <label for="nome">Digite seu nome:</label>
          <input class="form-control" type="text">
          <label for="tel">Digite seu telefone:</label>
          <input id="telefone" class="form-control" type="tel">
          <label for="email">Digite seu e-mail:</label>
          <input class="form-control" type="email">
          <label for="cpf">Digite seu CPF:</label>
          <input id="CPF" class="form-control" type="text">
          <div id="termo" class="form-check">
            <label class="form-check-label" for="text">Concordo com os termos</label>
            <input id="caixa" class="form-check-input" type="checkbox" required>
          </div>
          <div>
            <button id="cadastrar" class="btn btn-success">
              Cadastrar
            </button>
          </div>
        </form>
  </div>
  <script type="text/javascript" src="//code.jquery.com/jquery-1.11.0.min.js"></script>
  <script src="js/jquery.mask.min.js"></script>
  <script src="js/jquery.validate.min.js"></script>
  <script src="./js/messages_pt_BR.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
