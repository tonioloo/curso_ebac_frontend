<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.2/css/all.css"
      integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="content first-content">
        <div class="first-column">
          <h2 class="title title-primary">Seja bem vindo!</h2>
          <p class="description description-primary">
            Faça seu cadastro para mantermos contato
          </p>
          <p class="description description-primary">
            Por favor, coloque suas informações
          </p>
          <button id="signin" class="btn btn-primary">Login</button>
        </div>
        <div class="second-column">
          <h2 class="title title-second">Cadastrar</h2>
          <div class="social-media">
            <ul class="list-social-media">
              <a class="link-social-media" href="#">
                <li class="item-social-media">
                  <i class="fab fa-facebook-f"></i>
                </li>
              </a>
              <a class="link-social-media" href="#">
                <li class="item-social-media">
                  <i class="fab fa-google-plus-g"></i>
                </li>
              </a>
              <a class="link-social-media" href="#">
                <li class="item-social-media">
                  <i class="fab fa-linkedin-in"></i>
                </li>
              </a>
            </ul>
          </div>
          <p class="description description-second">
            Ou entre com o seu e-mail:
          </p>
          <form class="form">
            <div class="form-campo">
              <label class="label-input" for="">
                <input
                  type="text"
                  id="nome"
                  placeholder="Nome Completo"
                  name="nome"
                />
              </label>
            </div>

            <div class="form-campo">
              <label class="label-input" for="">
                <input type="email" placeholder="E-mail" name="email" />
              </label>
            </div>

            <div class="form-campo">
              <label class="label-input" for="telefone">
                <input
                  type="tel"
                  placeholder="Telefone"
                  id="telefone"
                  name="telefone"
                />
              </label>
            </div>

            <div class="form-campo">
              <label class="label-input" for="">
                <input type="text" id="cpf" placeholder="CPF" name="cpf" />
              </label>
            </div>

            <div class="form-campo">
              <label class="label-input" for="">
                <input type="text" placeholder="Endereço" name="endereco" />
              </label>
            </div>

            <div class="form-campo">
              <label class="label-input" for="">
                <input type="text" id="cep" placeholder="CEP" name="cep" />
              </label>
            </div>

            <button class="btn btn-second">sign up</button>
          </form>
        </div>
      </div>
      <div class="content second-content">
        <div class="first-column">
          <h2 class="title title-primary">hello, friend!</h2>
          <p class="description description-primary">
            Enter your personal details
          </p>
          <p class="description description-primary">
            and start journey with us
          </p>
          <button id="signup" class="btn btn-primary">sign up</button>
        </div>
        <div class="second-column">
          <h2 class="title title-second">sign in to developer</h2>
          <div class="social-media">
            <ul class="list-social-media">
              <a class="link-social-media" href="#">
                <li class="item-social-media">
                  <i class="fab fa-facebook-f"></i>
                </li>
              </a>
              <a class="link-social-media" href="#">
                <li class="item-social-media">
                  <i class="fab fa-google-plus-g"></i>
                </li>
              </a>
              <a class="link-social-media" href="#">
                <li class="item-social-media">
                  <i class="fab fa-linkedin-in"></i>
                </li>
              </a>
            </ul>
          </div>
          <p class="description description-second">
            or use your email account:
          </p>
          <form class="form">
            <label class="label-input" for="">
              <i class="far fa-envelope icon-modify"></i>
              <input type="email" placeholder="Email" />
            </label>

            <label class="label-input" for="">
              <i class="fas fa-lock icon-modify"></i>
              <input type="password" placeholder="Password" />
            </label>

            <a class="password" href="#">forgot your password?</a>
            <button class="btn btn-second">sign in</button>
          </form>
        </div>
      </div>
    </div>
    <script src="./js/jquery.mask.min.js"></script>
    <script src="./js/jquery.validate.min.js"></script>
    <script src="./js/messages_pt_BR.min.js"></script>
    <script src="js/main.js"></script>
    <script
      type="text/javascript"
      src="//code.jquery.com/jquery-1.11.0.min.js"
    ></script>
    <script
      type="text/javascript"
      src="//code.jquery.com/jquery-migrate-1.2.1.min.js"
    ></script>
    <script
      type="text/javascript"
      src="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"
    ></script>
    <script src="js/jquery.mask.min.js"></script>
    <script src="js/jquery.validate.min.js"></script>
    <script src="./js/messages_pt_BR.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
